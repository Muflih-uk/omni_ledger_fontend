name: omni_ledger
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.9.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  equatable: ^2.0.8
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  android: true
  ios: true

  color_dark: "#121212"
  image_dark: assets/logo.png

  android_12:
    image: assets/logo.png
    icon_background_color: "#ffffff"
    color: "#ffffff"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"
